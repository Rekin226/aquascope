[theme]
primaryColor = "#1565C0"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F0F2F6"
textColor = "#262730"
font = "sans serif"
baseRadius = "0.5rem"
# Native Streamlit charts follow the same fixed categorical order as the
# dashboard's Plotly template (colorblind-validated, assigned never cycled).
chartCategoricalColors = [
    "#2a78d6", "#008300", "#e87ba4", "#eda100",
    "#1baf7a", "#eb6834", "#4a3aa7", "#e34948",
]

[browser]
gatherUsageStats = false
